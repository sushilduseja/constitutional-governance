<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Governance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        surface: '#111827',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0e14; color: #e5e7eb; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #1f2937 25%, #374151 50%, #1f2937 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }
        textarea:focus, input:focus { outline: none; }
    </style>
</head>
<body class="min-h-screen font-sans">
    <div class="max-w-7xl mx-auto p-6 space-y-6">

        <!-- Header -->
        <header class="flex items-center justify-between">
            <div>
                <h1 class="text-xl font-semibold text-white tracking-tight">AI Governance</h1>
                <p class="text-xs text-gray-500 mt-0.5">Constitutional monitoring dashboard</p>
            </div>
            <div class="flex items-center gap-3">
                <span id="last-updated" class="text-[11px] text-gray-600 font-mono"></span>
                <button id="refresh-btn" class="text-xs px-3 py-1.5 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 transition-colors cursor-pointer">
                    Refresh
                </button>
            </div>
        </header>

        <!-- Stats Row -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
                <div class="text-[11px] text-gray-500 uppercase tracking-wider mb-1">Total Evaluations</div>
                <div id="stat-total" class="text-2xl font-semibold font-mono text-gray-100">—</div>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
                <div class="text-[11px] text-gray-500 uppercase tracking-wider mb-1">Compliance Rate</div>
                <div id="stat-compliance" class="text-2xl font-semibold font-mono">—</div>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
                <div class="text-[11px] text-gray-500 uppercase tracking-wider mb-1">Active Violations</div>
                <div id="stat-violations" class="text-2xl font-semibold font-mono">—</div>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-lg p-4">
                <div class="text-[11px] text-gray-500 uppercase tracking-wider mb-1">Constitution</div>
                <div id="stat-version" class="text-lg font-semibold font-mono text-indigo-400">—</div>
            </div>
        </div>

        <!-- Evaluate Form -->
        <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
            <div class="px-4 py-3 border-b border-gray-800">
                <h2 class="text-sm font-medium text-gray-200">Evaluate Response</h2>
            </div>
            <div class="p-4">
                <form id="evaluate-form" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                    <div>
                        <label class="block text-[11px] text-gray-500 uppercase tracking-wider mb-1">Model Provider</label>
                        <select id="eval-provider" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 focus:border-gray-600 transition-colors">
                            <option value="anthropic">Anthropic</option>
                            <option value="openai">OpenAI</option>
                            <option value="groq">Groq</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-500 uppercase tracking-wider mb-1">Model Name</label>
                        <input id="eval-model" type="text" value="claude-3-5-sonnet" placeholder="e.g. claude-3-5-sonnet"
                            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 placeholder-gray-600 focus:border-gray-600 transition-colors">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[11px] text-gray-500 uppercase tracking-wider mb-1">User Prompt</label>
                        <input id="eval-prompt" type="text" placeholder="What was asked..."
                            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 placeholder-gray-600 focus:border-gray-600 transition-colors">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-[11px] text-gray-500 uppercase tracking-wider mb-1">LLM Response</label>
                        <textarea id="eval-response" rows="3" placeholder="The response to evaluate..."
                            class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-200 placeholder-gray-600 focus:border-gray-600 transition-colors resize-y"></textarea>
                    </div>
                </form>
                <div class="flex items-center justify-between">
                    <div id="eval-result" class="text-xs text-gray-500"></div>
                    <button id="eval-submit" class="px-4 py-2 text-sm font-medium rounded bg-indigo-600 hover:bg-indigo-500 text-white transition-colors cursor-pointer">
                        Evaluate
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Grid: Audit Log + Rules -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

            <!-- Audit Log -->
            <div class="lg:col-span-2 bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
                    <h2 class="text-sm font-medium text-gray-200">Audit Log</h2>
                    <span id="log-count" class="text-[11px] text-gray-600 font-mono">—</span>
                </div>
                <div class="overflow-auto" style="max-height: 420px;">
                    <table class="w-full text-xs">
                        <thead class="bg-gray-950 sticky top-0">
                            <tr class="text-left text-[10px] text-gray-600 uppercase tracking-wider">
                                <th class="px-3 py-2 w-40">Time</th>
                                <th class="px-3 py-2 w-28">Model</th>
                                <th class="px-3 py-2 w-20 text-center">Status</th>
                                <th class="px-3 py-2 w-16 text-center">Score</th>
                                <th class="px-3 py-2 w-16 text-center">Violations</th>
                            </tr>
                        </thead>
                        <tbody id="audit-log-body" class="font-mono">
                            <tr id="skeleton-row-1"><td class="px-3 py-2"><div class="skeleton h-3 w-24"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-20"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-12"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-12"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-8"></div></td></tr>
                            <tr id="skeleton-row-2"><td class="px-3 py-2"><div class="skeleton h-3 w-24"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-20"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-12"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-12"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-8"></div></td></tr>
                            <tr id="skeleton-row-3"><td class="px-3 py-2"><div class="skeleton h-3 w-24"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-20"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-12"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-12"></div></td><td class="px-3 py-2"><div class="skeleton h-3 w-8"></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Constitution Rules -->
            <div class="bg-gray-900 border border-gray-800 rounded-lg overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
                    <h2 class="text-sm font-medium text-gray-200">Constitution Rules</h2>
                    <span id="rules-count" class="text-[11px] text-gray-600 font-mono">—</span>
                </div>
                <div id="rules-panel" class="overflow-auto" style="max-height: 420px;">
                    <div id="rules-skeleton" class="p-3 space-y-2">
                        <div class="skeleton h-16 w-full"></div>
                        <div class="skeleton h-16 w-full"></div>
                        <div class="skeleton h-16 w-full"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Display -->
        <div id="error-display" class="hidden p-4 bg-red-950 border border-red-900 rounded-lg text-red-400 text-xs"></div>
    </div>

    <script>
    const API = '/api';

    const severityColors = {
        critical: 'bg-red-950 text-red-400 border-red-900',
        high: 'bg-orange-950 text-orange-400 border-orange-900',
        medium: 'bg-yellow-950 text-yellow-400 border-yellow-900',
        low: 'bg-blue-950 text-blue-400 border-blue-900',
        info: 'bg-gray-800 text-gray-400 border-gray-700'
    };

    function hideSkeletons() {
        document.querySelectorAll('[id^="skeleton-row"]').forEach(r => r.remove());
        const rs = document.getElementById('rules-skeleton');
        if (rs) rs.remove();
    }

    function showSkeletons() {
        location.reload();
    }

    function showError(msg) {
        const el = document.getElementById('error-display');
        el.textContent = msg;
        el.classList.remove('hidden');
    }

    function formatTime(iso) {
        try {
            const d = new Date(iso);
            const now = new Date();
            const diffMs = now - d;
            const diffMins = Math.floor(diffMs / 60000);

            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffMins < 1440) return `${Math.floor(diffMins / 60)}h ago`;
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: false });
        } catch { return iso; }
    }

    function colorForScore(score) {
        if (score >= 0.8) return 'text-emerald-400';
        if (score >= 0.5) return 'text-amber-400';
        return 'text-red-400';
    }

    function statusBadge(status, compliant) {
        if (status === 'failed') {
            return '<span class="inline-flex items-center gap-1 text-[10px] px-1.5 py-0.5 rounded bg-gray-800 text-gray-400 border border-gray-700">failed</span>';
        }
        if (status === 'skipped') {
            return '<span class="inline-flex items-center gap-1 text-[10px] px-1.5 py-0.5 rounded bg-gray-800 text-gray-500 border border-gray-700">skipped</span>';
        }
        return compliant
            ? '<span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-emerald-900/60 text-emerald-400 text-[10px] font-bold">✓</span>'
            : '<span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-red-900/60 text-red-400 text-[10px] font-bold">✗</span>';
    }

    function updateStats(stats, constitutionVersion) {
        document.getElementById('stat-total').textContent = stats.total_evaluations.toLocaleString();
        document.getElementById('stat-compliance').textContent = (stats.compliance_rate ?? 0) + '%';
        document.getElementById('stat-compliance').className = `text-2xl font-semibold font-mono ${(stats.compliance_rate ?? 0) >= 90 ? 'text-emerald-400' : (stats.compliance_rate ?? 0) >= 70 ? 'text-amber-400' : 'text-red-400'}`;
        document.getElementById('stat-violations').textContent = (stats.active_violations ?? 0).toLocaleString();
        document.getElementById('stat-version').textContent = 'v' + (constitutionVersion || '?');
    }

    function renderAuditLog(entries) {
        hideSkeletons();
        const tbody = document.getElementById('audit-log-body');
        document.getElementById('log-count').textContent = `${entries.length} records`;

        if (entries.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-8 text-center text-gray-600 text-xs">No evaluations yet. Use the form above to evaluate a response.</td></tr>';
            return;
        }

        tbody.innerHTML = entries.map(e => `
            <tr class="border-t border-gray-800/50 hover:bg-gray-800/30 transition-colors ${e.status === 'failed' ? 'opacity-60' : ''}">
                <td class="px-3 py-2.5 text-gray-500">${formatTime(e.timestamp)}</td>
                <td class="px-3 py-2.5 text-gray-400 truncate max-w-[110px]" title="${e.model_name}">${e.model_name}</td>
                <td class="px-3 py-2.5 text-center">${statusBadge(e.status, e.compliant)}</td>
                <td class="px-3 py-2.5 text-center ${colorForScore(e.score)}">${(e.score * 100).toFixed(0)}%</td>
                <td class="px-3 py-2.5 text-center ${(e.violations?.length ?? 0) > 0 ? 'text-red-400' : 'text-gray-600'}">${e.violations?.length ?? 0}</td>
            </tr>
        `).join('');
    }

    function renderRules(constitution) {
        const panel = document.getElementById('rules-panel');
        const enabled = constitution.rules.filter(r => r.enabled).length;
        document.getElementById('rules-count').textContent = `${enabled}/${constitution.rules.length} active`;

        panel.innerHTML = constitution.rules.map(r => `
            <div class="p-3 border-b border-gray-800/50 last:border-0">
                <div class="flex items-start justify-between gap-2 mb-1.5">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="text-[10px] font-mono text-gray-600">${r.id}</span>
                        <span class="text-[10px] px-1.5 py-0.5 rounded border font-medium ${severityColors[r.severity] || severityColors.info}">${r.severity.toUpperCase()}</span>
                    </div>
                    <span class="text-[10px] ${r.enabled ? 'text-emerald-500' : 'text-gray-700'}">${r.enabled ? 'on' : 'off'}</span>
                </div>
                <p class="text-[11px] text-gray-400 leading-relaxed">${r.text}</p>
            </div>
        `).join('');
    }

    async function fetchData() {
        document.getElementById('last-updated').textContent = 'loading...';
        document.getElementById('error-display').classList.add('hidden');

        try {
            const [statsRes, constitutionRes, auditRes] = await Promise.all([
                fetch(`${API}/stats`),
                fetch(`${API}/constitution`),
                fetch(`${API}/audit-log?limit=100`)
            ]);

            if (!statsRes.ok || !constitutionRes.ok || !auditRes.ok) {
                throw new Error('API unavailable — check that the service is running');
            }

            const [stats, constitution, auditLog] = await Promise.all([
                statsRes.json(),
                constitutionRes.json(),
                auditRes.json()
            ]);

            updateStats(stats, constitution.version);
            renderRules(constitution);
            renderAuditLog(auditLog);
        } catch (err) {
            showError('Failed to load data: ' + err.message + '. Make sure uvicorn is running.');
            hideSkeletons();
            const tbody = document.getElementById('audit-log-body');
            tbody.innerHTML = '<tr><td colspan="5" class="px-3 py-8 text-center text-red-500 text-xs">Failed to load audit log</td></tr>';
        }

        document.getElementById('last-updated').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
    }

    // Evaluate form
    document.getElementById('eval-submit').addEventListener('click', async () => {
        const btn = document.getElementById('eval-submit');
        const result = document.getElementById('eval-result');
        const provider = document.getElementById('eval-provider').value;
        const model = document.getElementById('eval-model').value.trim();
        const prompt = document.getElementById('eval-prompt').value.trim();
        const response = document.getElementById('eval-response').value.trim();

        if (!model || !response) {
            result.textContent = 'Model name and LLM response are required.';
            result.className = 'text-xs text-amber-500';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Evaluating...';
        btn.className = 'px-4 py-2 text-sm font-medium rounded bg-gray-700 text-gray-400 cursor-not-allowed';
        result.textContent = '';

        try {
            const res = await fetch('/evaluate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_prompt: prompt,
                    llm_response: response,
                    model_provider: provider,
                    model_name: model
                })
            });

            const data = await res.json();

            if (data.status === 'success') {
                result.textContent = `${data.compliant ? 'COMPLIANT' : 'VIOLATIONS FOUND'} — Score: ${(data.score * 100).toFixed(0)}% — ${data.violations.length} violation(s)`;
                result.className = `text-xs font-medium ${data.compliant ? 'text-emerald-400' : 'text-red-400'}`;
            } else {
                result.textContent = `Evaluation failed: ${data.failure_reason || data.status}`;
                result.className = 'text-xs text-amber-500';
            }
        } catch (err) {
            result.textContent = 'Request failed: ' + err.message;
            result.className = 'text-xs text-red-400';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Evaluate';
            btn.className = 'px-4 py-2 text-sm font-medium rounded bg-indigo-600 hover:bg-indigo-500 text-white transition-colors cursor-pointer';
            fetchData();
        }
    });

    document.getElementById('refresh-btn').addEventListener('click', fetchData);
    document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
